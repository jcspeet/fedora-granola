<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d8eb8"/>
      <stop offset="100%" stop-color="#1e5c7a"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0eaf7"/>
    </linearGradient>
  </defs>

  <!-- Background plate -->
  <rect width="128" height="128" rx="26" ry="26" fill="url(#bg)"/>

  <!-- Subtle inner shadow -->
  <rect width="128" height="128" rx="26" ry="26" fill="none"
        stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Microphone capsule -->
  <rect x="50" y="16" width="28" height="46" rx="14" fill="url(#mic)"/>

  <!-- Microphone stand arc -->
  <path d="M 34 62 Q 34 90 64 90 Q 94 90 94 62"
        stroke="white" stroke-width="5.5" fill="none"
        stroke-linecap="round" opacity="0.95"/>

  <!-- Stem -->
  <line x1="64" y1="90" x2="64" y2="103"
        stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>

  <!-- Base -->
  <line x1="46" y1="103" x2="82" y2="103"
        stroke="white" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>

  <!-- Transcript lines (bottom-right corner) -->
  <rect x="72" y="58" width="24" height="4" rx="2" fill="white" opacity="0.35"/>
  <rect x="72" y="66" width="18" height="4" rx="2" fill="white" opacity="0.35"/>
  <rect x="72" y="74" width="21" height="4" rx="2" fill="white" opacity="0.35"/>
</svg>
